<!DOCTYPE html>
<html lang="ja">

<title>フジ化学 全自動電気亜鉛めっき装置 3D（実機準拠・暫定版）</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:"Meiryo","Hiragino Sans",sans-serif;background:#eef2f7;}
  #app{position:relative;width:100%;height:100%;}
  canvas{display:block;}
  #topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;
    padding:8px 12px;background:rgba(255,255,255,.92);border-bottom:1px solid #d4dce4;z-index:10;}
  #topbar h1{font-size:15px;margin:0;color:#1a3550;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .badge{font-size:11px;background:#fff3cd;color:#7a5b00;border:1px solid #e6c860;border-radius:4px;padding:2px 6px;white-space:nowrap;}
  .ctlbtn{font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid #9ab0c4;background:#fff;color:#1a3550;cursor:pointer;white-space:nowrap;}
  .ctlbtn:active{background:#dce8f2;}
  #bottombar{position:absolute;left:0;right:0;bottom:0;z-index:10;background:rgba(255,255,255,.94);
    border-top:1px solid #d4dce4;padding:6px 8px 10px;}
  #info{font-size:13px;color:#243b50;line-height:1.55;padding:4px 6px 8px;max-height:110px;overflow-y:auto;}
  #info b{color:#0d2b45;}
  #scenebtns{display:flex;gap:6px;overflow-x:auto;padding:2px;-webkit-overflow-scrolling:touch;}
  .sbtn{flex:0 0 auto;font-size:13px;padding:10px 12px;border-radius:10px;border:1px solid #9ab0c4;
    background:#f4f8fb;color:#1a3550;cursor:pointer;min-width:82px;text-align:center;}
  .sbtn.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8;font-weight:bold;}
  #err{position:absolute;top:40%;left:0;right:0;text-align:center;color:#a33;font-size:15px;display:none;z-index:20;}
  @media (max-width: 900px){
    #topbar h1{font-size:12px;} .badge{font-size:9px;padding:1px 4px;} .ctlbtn{font-size:12px;padding:7px 10px;}
    #info{font-size:12px;max-height:96px;line-height:1.5;} .sbtn{font-size:12px;min-width:70px;padding:9px 8px;}
  }
  @media (max-height: 600px){ #info{max-height:60px;} }
</style>

<body>
<div id="app">
  <div id="topbar">
    <h1>フジ化学 全自動電気亜鉛めっき装置 3D（実機準拠）</h1>
    <span class="badge">暫定版・図面/写真ベース</span>
    <button class="ctlbtn" id="playbtn">⏸ 一時停止</button>
    <button class="ctlbtn" id="spdbtn">速度 1x</button>
  </div>
  <div id="err">WebGL を初期化できませんでした。ブラウザ／ネット接続をご確認ください。</div>
  <div id="bottombar"><div id="info"></div><div id="scenebtns"></div></div>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

let renderer;
try { renderer = new THREE.WebGLRenderer({ antialias: true }); }
catch (e) { document.getElementById('err').style.display = 'block'; throw e; }
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('app').prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeef2f7);
scene.fog = new THREE.Fog(0xeef2f7, 160, 340);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 700);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49; controls.minDistance = 6; controls.maxDistance = 240;

scene.add(new THREE.AmbientLight(0xffffff, 0.78));
const sun = new THREE.DirectionalLight(0xffffff, 1.15); sun.position.set(50, 80, 60); scene.add(sun);

const floor = new THREE.Mesh(new THREE.PlaneGeometry(560, 360), new THREE.MeshLambertMaterial({ color: 0xd8e0e8 }));
floor.rotation.x = -Math.PI / 2; scene.add(floor);
const grid = new THREE.GridHelper(560, 112, 0xb8c4d0, 0xc8d4de); grid.position.y = 0.01; scene.add(grid);

/* ---------- ラベル（ツアー＝動画時は非表示。文字よりナレーション） ---------- */
const labels = [];
function makeLabel(text, scale = 0.5, fg = '#16314a', bg = 'rgba(255,255,255,0.92)') {
  const pad = 16, fs = 42;
  const cv = document.createElement('canvas');
  const m = cv.getContext('2d'); m.font = `bold ${fs}px Meiryo, sans-serif`;
  cv.width = Math.ceil(m.measureText(text).width) + pad * 2; cv.height = fs + pad * 2;
  const c = cv.getContext('2d');
  c.fillStyle = bg; c.strokeStyle = '#7a93aa'; c.lineWidth = 3;
  c.beginPath(); c.roundRect(2, 2, cv.width - 4, cv.height - 4, 14); c.fill(); c.stroke();
  c.font = `bold ${fs}px Meiryo, sans-serif`; c.fillStyle = fg; c.textBaseline = 'middle';
  c.fillText(text, pad, cv.height / 2 + 2);
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, depthWrite: false }));
  sp.scale.set(cv.width / 60 * scale, cv.height / 60 * scale, 1);
  return sp;
}
function lblAt(text, scale, x, y, z, fg, bg) { const s = makeLabel(text, scale, fg, bg); s.position.set(x, y, z); labels.push(s); return s; }

/* ---------- 競走路（スタジアム）経路 ---------- */
const L = 64, R = 13;
const PERIM = 2 * L + 2 * Math.PI * R;
const ARC = Math.PI * R;
const DIR = 1; // 周回方向（必要なら-1で反転）
function rawPoint(d) {
  d = ((d % PERIM) + PERIM) % PERIM;
  if (d < L) return new THREE.Vector3(d, 0, R);
  d -= L;
  if (d < ARC) { const a = d / R; return new THREE.Vector3(L + Math.sin(a) * R, 0, Math.cos(a) * R); }
  d -= ARC;
  if (d < L) return new THREE.Vector3(L - d, 0, -R);
  d -= L; const a = d / R; return new THREE.Vector3(-Math.sin(a) * R, 0, -Math.cos(a) * R);
}
function pathPoint(d) { const p = rawPoint(DIR * d); p.z = -p.z; return p; } // z反転＝右回り
function pathHeading(d) { const p1 = pathPoint(d), p2 = pathPoint(d + 0.01); return Math.atan2(-(p2.z - p1.z), p2.x - p1.x); }
const CTR = new THREE.Vector3(L / 2, 0, 0);

/* ---------- 工程：めっき槽＝右コーナー（右側のみ） ---------- */
const PLATE0 = L + 1, PLATE1 = L + ARC - 1;   // 右カーブ＝亜鉛めっき槽（長い1槽・17ラック）
const TANK_H = 5, TANK_D = 6.6, TOP_Y = 7.8, DIP_Y = 2.6;

const PRE = [
  { name: '陰極電解脱脂', color: 0x4f9bd9, bub: true }, { name: '水洗', color: 0x86d8ea }, { name: '酸洗', color: 0xe3cf57 },
  { name: 'アルカリ脱脂', color: 0x4f7bd9, bub: true }, { name: '水洗', color: 0x86d8ea }, { name: '水洗', color: 0x86d8ea },
  { name: 'PR電解脱脂', color: 0x4f9bd9, bub: true }, { name: '水洗', color: 0x86d8ea }, { name: '活性化', color: 0xf0c98a }, { name: '水洗', color: 0x86d8ea },
];
const POST = [
  { name: '水洗', color: 0x86d8ea }, { name: '本洗', color: 0x86d8ea }, { name: '水洗', color: 0x86d8ea }, { name: '硝酸', color: 0xf0c98a },
  { name: '水洗', color: 0x86d8ea }, { name: '三価クロメート', color: 0xa8d18a }, { name: '水洗', color: 0x86d8ea }, { name: '水洗', color: 0x86d8ea },
  { name: '三価クロメート', color: 0xa8d18a }, { name: '水洗', color: 0x86d8ea }, { name: '仕上', color: 0xc9b3e0 },
];
const SOAK = { '水洗': 1.0, '本洗': 1.2, '酸洗': 1.8, '硝酸': 1.4, '活性化': 1.4, 'アルカリ脱脂': 2.0, '陰極電解脱脂': 2.0, 'PR電解脱脂': 2.0, '三価クロメート': 1.8, '仕上': 1.2 };

const STATIONS = [];
STATIONS.push({ name: '投入', kind: 'load', d: 4, color: 0x9aa6b0 });
PRE.forEach((s, i) => STATIONS.push({ ...s, kind: 'tank', d: 11 + i * ((L - 16) / (PRE.length - 1)) }));   // 前処理＝前直線（左→右）
const plating = { name: '亜鉛めっき槽', kind: 'plating', d0: PLATE0, d1: PLATE1, color: 0x8fa6be };
STATIONS.push(plating);
POST.forEach((s, i) => STATIONS.push({ ...s, kind: 'tank', d: (PLATE1 + 5) + i * ((PERIM - (PLATE1 + 5) - ARC - 6) / (POST.length - 1)) })); // 後処理＝奥直線（右→左）
const transfer = { name: '乗せ換え', kind: 'transfer', d: 2 * L + ARC + ARC * 0.5, color: 0xb0a06a };
STATIONS.push(transfer);

/* ---------- 中央島 ---------- */
const island = new THREE.Mesh(new THREE.BoxGeometry(L + 2 * R - 12, 2.6, 2 * R - TANK_D - 2.0), new THREE.MeshLambertMaterial({ color: 0xcdd6df }));
island.position.set(L / 2, 1.3, 0); scene.add(island);
scene.add(lblAt('中央島', 0.5, L / 2, 4.2, 0));

/* ---------- 通常タンク ---------- */
const highlightables = []; let si = 0;
for (const st of STATIONS) {
  if (st.kind === 'plating') continue;
  const p = pathPoint(st.d), head = pathHeading(st.d); st.pos = p;
  const g = new THREE.Group(); g.position.copy(p); g.rotation.y = head;
  const w = 4.6;
  if (st.kind === 'tank') {
    const shell = new THREE.Mesh(new THREE.BoxGeometry(w, TANK_H, TANK_D), new THREE.MeshLambertMaterial({ color: 0xb8c4cc }));
    shell.position.y = TANK_H / 2; g.add(shell); st.shellMat = shell.material;
    const liq = new THREE.Mesh(new THREE.BoxGeometry(w - 0.3, 0.18, TANK_D - 0.3), new THREE.MeshLambertMaterial({ color: st.color, transparent: true, opacity: 0.95 }));
    liq.position.y = TANK_H + 0.02; g.add(liq);
    const band = new THREE.Mesh(new THREE.BoxGeometry(w + 0.06, 1.0, TANK_D + 0.06), new THREE.MeshLambertMaterial({ color: st.color }));
    band.position.y = TANK_H - 0.6; g.add(band);
  } else {
    const plat = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 1.1, TANK_D + 1.5), new THREE.MeshLambertMaterial({ color: st.color }));
    plat.position.y = 0.55; g.add(plat); st.shellMat = plat.material;
  }
  const lb = lblAt(st.name, 0.5, 0, TANK_H + ((si % 2) ? 1.4 : 2.6), 0); g.add(lb);
  scene.add(g); st.group = g; highlightables.push(st); si++;
}

/* ---------- めっき槽（右コーナー・長い1槽） ---------- */
const platingGroup = new THREE.Group(); scene.add(platingGroup);
const SEG = 24;
for (let i = 0; i <= SEG; i++) {
  const d = PLATE0 + (PLATE1 - PLATE0) * i / SEG; const p = pathPoint(d), head = pathHeading(d);
  const seg = new THREE.Mesh(new THREE.BoxGeometry((PLATE1 - PLATE0) / SEG + 0.6, TANK_H, TANK_D + 1.4), new THREE.MeshLambertMaterial({ color: 0xa9b6c2 }));
  seg.position.set(p.x, TANK_H / 2, p.z); seg.rotation.y = head; platingGroup.add(seg);
  const liq = new THREE.Mesh(new THREE.BoxGeometry((PLATE1 - PLATE0) / SEG + 0.8, 0.2, TANK_D + 0.8), new THREE.MeshLambertMaterial({ color: 0x90a4bc, transparent: true, opacity: 0.95 }));
  liq.position.set(p.x, TANK_H + 0.02, p.z); liq.rotation.y = head; platingGroup.add(liq);
}
const pmid = pathPoint((PLATE0 + PLATE1) / 2); plating.pos = pmid;
platingGroup.add(lblAt('亜鉛めっき槽（右側・17ラックが浸かったまま横行）', 0.6, pmid.x + 6, TANK_H + 3.4, pmid.z));
const electronGroups = [];
for (const frac of [0.25, 0.5, 0.75]) {
  const d = PLATE0 + (PLATE1 - PLATE0) * frac; const p = pathPoint(d);
  const out = new THREE.Vector3().subVectors(p, CTR).setY(0).normalize();
  const rp = p.clone().add(out.clone().multiplyScalar(TANK_D / 2 + 3.2));
  const rect = new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.8, 1.8), new THREE.MeshLambertMaterial({ color: 0x3d4f5e }));
  rect.position.set(rp.x, 1.4, rp.z); rect.lookAt(p.x, 1.4, p.z); platingGroup.add(rect);
  platingGroup.add(lblAt('整流器', 0.42, rp.x, 3.7, rp.z));
  const pts = [];
  for (let i = 0; i < 5; i++) { const mm = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffb83d })); platingGroup.add(mm); pts.push({ mesh: mm, t: i / 5 }); }
  electronGroups.push({ pts, from: new THREE.Vector3(rp.x, 2.8, rp.z), to: new THREE.Vector3(p.x, TANK_H - 0.3, p.z) });
}

/* ---------- レール・支柱 ---------- */
{
  const pts = [];
  for (let i = 0; i < 240; i++) { const p = pathPoint(PERIM * i / 240); pts.push(new THREE.Vector3(p.x, 10.6, p.z)); }
  const rail = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts, true), 280, 0.34, 7, true), new THREE.MeshLambertMaterial({ color: 0x6a7d8e }));
  scene.add(rail);
  for (let i = 0; i < 12; i++) {
    const p = pathPoint(PERIM * i / 12);
    const inw = new THREE.Vector3().subVectors(CTR, p).setY(0).normalize().multiplyScalar(2.6);
    const col = new THREE.Mesh(new THREE.BoxGeometry(0.8, 10.6, 0.8), new THREE.MeshLambertMaterial({ color: 0x7d8fa0 }));
    col.position.set(p.x + inw.x, 5.3, p.z + inw.z); scene.add(col);
  }
}

/* ---------- ハンガー（ごつい：黒く厚い枠・多段・小部品が密／結合ジオメトリ） ---------- */
function makeHanger() {
  const frameGeos = [], partGeos = [];
  const COLS = [-1.05, 1.05];   // 2列
  const TIERS = 10;             // 多段
  const top = 0.2, bottom = -4.2, gap = (top - bottom) / TIERS;
  for (const cz of COLS) for (const rx of [-1.25, 1.25]) { const g = new THREE.BoxGeometry(0.18, 4.6, 0.18); g.translate(rx, bottom + 2.2, cz); frameGeos.push(g); }
  for (const rx of [-1.25, 1.25]) { const g = new THREE.BoxGeometry(0.18, 0.18, 2.5); g.translate(rx, top, 0); frameGeos.push(g); } // 上枠つなぎ
  const tb = new THREE.BoxGeometry(3.0, 0.34, 2.6); tb.translate(0, 0.55, 0); frameGeos.push(tb); // ごつい上桟
  const hook = new THREE.BoxGeometry(0.22, 1.0, 0.22); hook.translate(0, 1.1, 0); frameGeos.push(hook);
  for (let t = 0; t < TIERS; t++) {
    const y = top - 0.25 - t * gap;
    for (const cz of COLS) {
      const bar = new THREE.BoxGeometry(2.4, 0.12, 0.14); bar.translate(0, y, cz); frameGeos.push(bar);
      for (const bx of [-0.8, -0.27, 0.27, 0.8]) { const pt = new THREE.BoxGeometry(0.34, 0.5, 0.1); pt.translate(bx, y - 0.32, cz); partGeos.push(pt); }
    }
  }
  const grp = new THREE.Group();
  grp.add(new THREE.Mesh(mergeGeometries(frameGeos), new THREE.MeshLambertMaterial({ color: 0x26282d })));   // 黒い枠
  grp.add(new THREE.Mesh(mergeGeometries(partGeos), new THREE.MeshLambertMaterial({ color: 0xb7c0c8 })));     // 小部品
  return grp;
}
const N_CAR = 26; const carriers = [];
for (let i = 0; i < N_CAR; i++) {
  const grp = new THREE.Group();
  const trolley = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.2, 2.2), new THREE.MeshLambertMaterial({ color: 0x2f5d8a }));
  trolley.position.y = 11.2; grp.add(trolley);
  const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1, 6), new THREE.MeshLambertMaterial({ color: 0x3a4047 })); grp.add(cable);
  const fixture = makeHanger(); grp.add(fixture);
  scene.add(grp);
  carriers.push({ grp, cable, fixture, off: i / N_CAR * PERIM, y: TOP_Y });
}

/* ---------- 乗せ換え→サブコンベア（U字ループ・乾燥炉は中央を貫通）→本体へ戻る ---------- */
const subGroup = new THREE.Group(); scene.add(subGroup);
// 本ループの外側に平行な2レーン（往路SZ1・復路SZ2）。遠端でUターン、近端の乗せ換え装置で本体へ戻る。
const SZ1 = R + 13, SZ2 = R + 21, SZC = (SZ1 + SZ2) / 2, SR2 = (SZ2 - SZ1) / 2;
const SX0 = -6, SX1 = L + 4, SLEN = SX1 - SX0;
const SPER = 2 * SLEN + 2 * Math.PI * SR2;
function subPos(u) {
  let d = (((u % 1) + 1) % 1) * SPER;
  if (d < SLEN) return new THREE.Vector3(SX0 + d, 3.0, SZ1);                       // 往路（乾燥炉を通る）
  d -= SLEN;
  if (d < Math.PI * SR2) { const a = d / SR2; return new THREE.Vector3(SX1 + Math.sin(a) * SR2, 3.0, SZC - Math.cos(a) * SR2); } // 遠端Uターン
  d -= Math.PI * SR2;
  if (d < SLEN) return new THREE.Vector3(SX1 - d, 3.0, SZ2);                       // 復路
  d -= SLEN; const a = d / SR2; return new THREE.Vector3(SX0 - Math.sin(a) * SR2, 3.0, SZC + Math.cos(a) * SR2); // 乗せ換え側Uターン
}
{ const pts = []; for (let i = 0; i < 180; i++) pts.push(subPos(i / 180));
  subGroup.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts, true), 200, 0.5, 6, true), new THREE.MeshLambertMaterial({ color: 0x8893a0 }))); }
// 乾燥炉（往路レーンの中央。入口・出口あり＝コンベアが貫通）
const ovenX = (SX0 + SX1) / 2;
const oven = new THREE.Mesh(new THREE.BoxGeometry(14, 5.4, 4.2), new THREE.MeshLambertMaterial({ color: 0xc9805c }));
oven.position.set(ovenX, 3.4, SZ1); subGroup.add(oven);
const ovenStripe = new THREE.Mesh(new THREE.BoxGeometry(14.1, 0.8, 4.3), new THREE.MeshLambertMaterial({ color: 0xe8a23f })); ovenStripe.position.set(ovenX, 5.3, SZ1); subGroup.add(ovenStripe);
subGroup.add(lblAt('乾燥炉（コンベア中央・入口/出口）', 0.55, ovenX, 7.6, SZ1));
// 乗せ換え装置（近端・本体へ戻す）＋本ループとの渡り
const tpos = pathPoint(transfer.d);
const tdev = new THREE.Mesh(new THREE.BoxGeometry(3.6, 3.2, 4.0), new THREE.MeshLambertMaterial({ color: 0x9aa3ad }));
tdev.position.set(SX0, 1.7, SZC); subGroup.add(tdev);
subGroup.add(lblAt('乗せ換え装置（本体へ戻す）', 0.5, SX0, 4.4, SZC));
{ const dx = SX0 - tpos.x, dz = SZC - tpos.z; const br = new THREE.Mesh(new THREE.BoxGeometry(Math.hypot(dx, dz), 0.5, 1.6), new THREE.MeshLambertMaterial({ color: 0x9aa3ad }));
  br.position.set((SX0 + tpos.x) / 2, 1.2, (SZC + tpos.z) / 2); br.rotation.y = Math.atan2(-dz, dx); subGroup.add(br); }
// 流れるワーク（サブループを周回）
const subParts = [];
for (let i = 0; i < 18; i++) { const m = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.9, 2.2), new THREE.MeshLambertMaterial({ color: 0xb7c0c8 })); subGroup.add(m); subParts.push({ mesh: m, t: i / 18 }); }
// 乾燥炉の熱気
const heatN = 18, heatPos = new Float32Array(heatN * 3), heatSeed = [];
for (let i = 0; i < heatN; i++) { heatPos.set([ovenX + (Math.random() - 0.5) * 12, 6 + Math.random() * 3, SZ1 + (Math.random() - 0.5) * 4], i * 3); heatSeed.push({ sp: 0.8 + Math.random() }); }
const heatGeo = new THREE.BufferGeometry(); heatGeo.setAttribute('position', new THREE.BufferAttribute(heatPos, 3));
subGroup.add(new THREE.Points(heatGeo, new THREE.PointsMaterial({ color: 0xe8804f, size: 0.25, transparent: true, opacity: 0.5 })));

/* ---------- 制御盤 ---------- */
const plc = new THREE.Group();
const pp = pathPoint(24); const plcOut = new THREE.Vector3().subVectors(pp, CTR).setY(0).normalize().multiplyScalar(TANK_D / 2 + 5.5);
plc.position.set(pp.x + plcOut.x, 0, pp.z + plcOut.z);
const cab = new THREE.Mesh(new THREE.BoxGeometry(2.2, 4.0, 1.0), new THREE.MeshLambertMaterial({ color: 0xbac4ce })); cab.position.y = 2.0; plc.add(cab);
const led = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), new THREE.MeshBasicMaterial({ color: 0x35d435 })); led.position.set(0.6, 3.3, 0.55); plc.add(led);
plc.add(lblAt('制御盤（PLC）', 0.5, 0, 4.9, 0)); scene.add(plc);

/* ---------- 泡 ---------- */
const bubbleSystems = [];
for (const st of STATIONS) {
  if (st.kind !== 'tank' || !st.bub) continue;
  const N = 32, pos = new Float32Array(N * 3), seed = [];
  for (let i = 0; i < N; i++) { const sx = st.pos.x + (Math.random() - 0.5) * 3.4, sz = st.pos.z + (Math.random() - 0.5) * (TANK_D - 1.5); pos.set([sx, 1 + Math.random() * (TANK_H - 1.6), sz], i * 3); seed.push({ sp: 0.6 + Math.random() * 1.2 }); }

}
{ const N = 70, pos = new Float32Array(N * 3), seed = [];
  for (let i = 0; i < N; i++) { const d = PLATE0 + Math.random() * (PLATE1 - PLATE0); const p = pathPoint(d); pos.set([p.x + (Math.random() - 0.5) * 2, 1 + Math.random() * (TANK_H - 1.6), p.z + (Math.random() - 0.5) * 4], i * 3); seed.push({ sp: 0.7 + Math.random() * 1.2 }); }

/* ---------- 動作（一斉横行＋時間差昇降／めっき槽は浸漬したまま横行） ---------- */

    c.fixture.position.y = c.y; const topF = c.y + 0.2;

}

/* ---------- 場面 ---------- */

const SCENES = [

let camFrom = null, camTo = null, camT = 1, curScene = 0;
function gotoScene(i) {

  const aspect = window.innerWidth / Math.max(window.innerHeight, 1); const f = Math.max(1, 1.05 / Math.max(aspect, 0.2));
  const tgtV = new THREE.Vector3(...sc.tgt); const posV = tgtV.clone().add(new THREE.Vector3(...sc.pos).sub(tgtV).multiplyScalar(f));
  camTo = { p: posV, t: tgtV }; camT = 0;
  document.getElementById('info').innerHTML = `<b>${sc.title}</b><br>${sc.desc}`;
  document.querySelectorAll('.sbtn').forEach((b, j) => b.classList.toggle('active', j === i));
}
const btnWrap = document.getElementById('scenebtns');

document.getElementById('playbtn').onclick = function () { playing = !playing; this.textContent = playing ? '⏸ 一時停止' : '▶ 再生'; };
document.getElementById('spdbtn').onclick = function () { speed = (speed === 1) ? 2 : 1; this.textContent = `速度 ${speed}x`; };

/* ---------- ツアー（動画）：文字ラベル非表示 ---------- */
const params = new URLSearchParams(location.search);
const TOUR = params.get('tour') === '1';
const DWELL = 11, ORBIT = 0.07;
let tourT0 = -1, tourEnded = false, tourArmed = false;
window.__tourInfo = { dwell: DWELL, scenes: SCENES.length, total: DWELL * SCENES.length };
window.__beginTour = () => { tourArmed = true; };

const clock = new THREE.Clock();
function tick() {

  if (TOUR && tourArmed) {
    if (tourT0 < 0) tourT0 = t; const el = t - tourT0; const idx = Math.min(SCENES.length - 1, Math.floor(el / DWELL));
    if (idx !== curScene) gotoScene(idx);

  }

  { const arr = heatGeo.attributes.position.array; for (let i = 0; i < heatSeed.length; i++) { let y = arr[i * 3 + 1] + heatSeed[i].sp * dt; if (y > 11) y = 6; arr[i * 3 + 1] = y; } heatGeo.attributes.position.needsUpdate = true; }
  for (const eg of electronGroups) for (const p of eg.pts) { p.t = (p.t + dt * 0.5) % 1; p.mesh.position.lerpVectors(eg.from, eg.to, p.t); }
  for (const sp of subParts) { sp.t = (sp.t + dt * 0.03) % 1; sp.mesh.position.copy(subPos(sp.t)); }
  if (camT < 1) {

}
