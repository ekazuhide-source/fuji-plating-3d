<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>フジ化学 電気亜鉛めっき 3D教材</title>
<style>
  body{margin:0;font-family:"Hiragino Sans","Meiryo",sans-serif;background:#eef2f7;color:#16314a;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:640px;margin:0 auto;padding:20px 18px 40px;}
  h1{font-size:20px;line-height:1.4;margin:8px 0 4px;}
  .sub{color:#5b7088;font-size:13px;margin-bottom:20px;}
  .card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #d4dce4;
    border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(20,49,74,.06);}
  .card:active{background:#eef4fa;}
  .card h2{font-size:17px;margin:0 0 6px;color:#1a5fa8;}
  .card p{font-size:13px;line-height:1.6;margin:0;color:#3a5168;}
  .tag{display:inline-block;font-size:11px;background:#eaf2fb;color:#1a5fa8;border:1px solid #c2d8ef;
    border-radius:6px;padding:2px 8px;margin-top:10px;}
  .note{font-size:12px;color:#7088a0;margin-top:18px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <h1>電気亜鉛めっき 3D教材</h1>
  <div class="sub">有限会社フジ化学 ／ 新入社員向け（暫定版・槽の並び順は推定）</div>

  <a class="card" href="line.html">
    <h2>① めっきライン 3D（装置の動き）</h2>
    <p>エレベーター式・楕円ループの全自動めっき装置。投入から取出しまでの工程の流れを、回して・拡大して見られます。</p>
    <span class="tag">指で回転・ズーム／場面切替</span>
  </a>

  <div class="card" style="opacity:.6">
    <h2>② めっき生成プロセス 3D（化学のしくみ）<span style="font-size:12px;color:#a3603a">（準備中）</span></h2>
    <p>電気で亜鉛が品物に付くしくみを、工場サイズから分子サイズまで拡大して見られます。近日公開予定です。</p>
  </div>

  <div class="note">
    ※スマホでは指でドラッグ＝回転、ピンチ＝ズーム。下のボタンで場面が切り替わります。<br>
    読み込みにインターネット接続が必要です（3D描画ライブラリを読み込みます）。
  </div>
</div>
</body>
</html>
